<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Resolution Scale Calculator</title>
  <style>
    :root {
      --bg: #09070b;
      --card: #151019;
      --card-2: #1d1423;
      --text: #f2e9ff;
      --muted: #b8a7c9;
      --accent: #9d4edd;
      --accent-2: #ff4d8d;
      --border: #3b2946;
      --good: #81f4b7;
      --warning: #ffb86b;
      --blue: #8ecaff;
      --shadow: rgba(157, 78, 221, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Manrope", sans-serif;
      max-width: 1180px;
      margin: 30px auto;
      padding: 0 20px 40px;
      background:
        radial-gradient(circle at top left, rgba(157, 78, 221, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 77, 141, 0.12), transparent 35%),
        linear-gradient(135deg, #050407, #100914 55%, #050407);
      color: var(--text);
      min-height: 100vh;
    }

    h1 {
      font-family: "Manrope", sans-serif;
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 42px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: 0 0 12px rgba(157, 78, 221, 0.75);
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .note {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    .card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
        var(--card);
      padding: 22px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 0 22px var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.03);
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent));
      opacity: 0.9;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
      color: #eadbff;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      max-width: 240px;
      padding: 11px 12px;
      margin-top: 6px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0d0911;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.35);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(157, 78, 221, 0.5);
    }

    .scale-options {
      margin-top: 15px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      color: #eadbff;
    }

    .scale-options label {
      margin-top: 0;
      font-weight: bold;
    }

    input[type="radio"] {
      width: auto;
      max-width: none;
      accent-color: var(--accent);
      transform: scale(1.15);
      margin-right: 8px;
    }

    input[type="checkbox"] {
      width: auto;
      max-width: none;
      accent-color: var(--accent);
      transform: scale(1.15);
      margin-right: 8px;
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      font-size: 16px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: linear-gradient(135deg, #2a1438, #5a189a);
      color: white;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      box-shadow: 0 0 16px rgba(157, 78, 221, 0.45);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
      box-shadow: 0 0 24px rgba(255, 77, 141, 0.5);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .summary {
      line-height: 1.75;
      color: var(--text);
    }

    .summary strong {
      color: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: transparent;
      font-size: 14px;
      overflow: hidden;
      border-radius: 10px;
    }

    th, td {
      padding: 11px;
      border-bottom: 1px solid var(--border);
      text-align: right;
    }

    th {
      background: linear-gradient(135deg, #24102e, #3c096c);
      color: white;
      position: sticky;
      top: 0;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: 12px;
    }

    td {
      background: rgba(255,255,255,0.025);
    }

    tr:hover td {
      background: rgba(157, 78, 221, 0.13);
    }

    td:first-child, th:first-child {
      text-align: left;
    }

    .good {
      color: var(--good);
      font-weight: bold;
      text-shadow: 0 0 8px rgba(129, 244, 183, 0.25);
    }

    .down {
      color: var(--warning);
    }

    .up {
      color: var(--blue);
    }

    .footer-mark {
      text-align: center;
      color: #7d6b8f;
      font-size: 12px;
      margin-top: 20px;
      letter-spacing: 1px;
    }


    @media (max-width: 700px) {
      body {
        margin: 0;
        max-width: none;
        overflow-x: hidden;
        padding-top: max(14px, env(safe-area-inset-top));
        padding-right: max(12px, env(safe-area-inset-right));
        padding-bottom: max(28px, env(safe-area-inset-bottom));
        padding-left: max(12px, env(safe-area-inset-left));
      }

      h1 {
        font-size: 24px;
        line-height: 1.15;
        letter-spacing: 0.8px;
        margin-top: 8px;
        padding-bottom: 10px;
      }

      .card {
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 16px;
      }

      label {
        font-size: 14px;
      }

      input[type="number"] {
        width: 100%;
        max-width: none;
        min-height: 46px;
        font-size: 17px;
      }

      input[type="checkbox"],
      input[type="radio"] {
        transform: scale(1.25);
        margin-right: 10px;
      }

      .scale-options {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .scale-options label {
        display: flex;
        align-items: center;
        min-height: 42px;
      }

      button {
        width: 100%;
        min-height: 50px;
        font-size: 16px;
        margin-top: 18px;
      }

      .summary {
        font-size: 14px;
        line-height: 1.7;
      }

      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 10px;
      }

      table {
        min-width: 780px;
        font-size: 12px;
      }

      th, td {
        padding: 9px 8px;
        white-space: nowrap;
      }

      th {
        position: static;
      }

      .footer-mark {
        font-size: 10px;
        margin-top: 14px;
      }
    }
  
    .chicken-runner {
      position: fixed;
      left: 100vw;
      z-index: 99999;
      pointer-events: none;
      user-select: none;
      animation-name: chickenRun;
      animation-timing-function: linear;
      animation-fill-mode: both;
      filter: drop-shadow(0 0 8px rgba(255, 196, 77, 0.55));
    }

    @keyframes chickenRun {
      from {
        transform: translateX(180px) scaleX(-1);
      }
      to {
        transform: translateX(calc(-100vw - 260px)) scaleX(-1);
      }
    }
      to {
        transform: translateX(calc(100vw + 180px)) scaleX(1);
      }
    }

  
    .signal-2k {
      color: #81f4b7;
      font-weight: 800;
    }

    .signal-4k {
      color: #8ecaff;
      font-weight: 800;
    }

    .signal-dual {
      color: #ffb86b;
      font-weight: 800;
    }

    .signal-above {
      color: #ff4d8d;
      font-weight: 800;
    }

  </style>
</head>
<body>

  <h1>Resolution Scale Calculator</h1>
  

  <div class="card">
    <label>Original Width px</label>
    <input type="number" id="width" value="4608" min="1" />

    <label>Original Height px</label>
    <input type="number" id="height" value="1152" min="1" />

    <label>Optional Max Width px</label>
    <input type="number" id="maxWidth" value="4096" min="1" />

    <label style="margin-top:15px;">
  <input type="checkbox" id="onlyValid" checked />
  Only show resolutions within max width
</label>

<div class="scale-options">
  <label><input type="radio" name="scaleMode" value="down" checked> Downscale Only</label>
  <label><input type="radio" name="scaleMode" value="up"> Upscale Only</label>
  <label><input type="radio" name="scaleMode" value="all"> Show All</label>
</div>

<button id="calculateBtn" onclick="calculate()">Calculate</button>

  </div>

  <div class="card summary" id="summary"></div>

  <div class="card">
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Resolution</th>
          <th>Scale</th>
          <th>Width</th>
          <th>Height</th>
          <th>Pixel Count</th>
          <th>Signal Type</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
    </div>
  </div>

<script>
function gcd(a, b) {
  a = Math.abs(a);
  b = Math.abs(b);
  while (b) {
    let t = b;
    b = a % b;
    a = t;
  }
  return a;
}




function getSignalType(w, h) {
  const pixels = w * h;

  const limits = {
    twoK: {
      maxWidth: 1920,
      maxHeight: 1200,
      maxPixels: 1920 * 1200
    },
    dualLink: {
      maxWidth: 3840,
      maxHeight: 1080,
      maxPixels: 3840 * 1080
    },
    fourK: {
      maxWidth: 8192,
      maxHeight: 2160,
      maxPixels: 3840 * 2160
    }
  };

  if (
    w <= limits.twoK.maxWidth &&
    h <= limits.twoK.maxHeight &&
    pixels <= limits.twoK.maxPixels
  ) {
    return {
      label: "2K",
      className: "signal-2k"
    };
  }

  if (
    w <= limits.dualLink.maxWidth &&
    h <= limits.dualLink.maxHeight &&
    pixels <= limits.dualLink.maxPixels
  ) {
    return {
      label: "DL",
      className: "signal-dual"
    };
  }

  if (
    w <= limits.fourK.maxWidth &&
    h <= limits.fourK.maxHeight &&
    pixels <= limits.fourK.maxPixels
  ) {
    return {
      label: "4K",
      className: "signal-4k"
    };
  }

  return {
    label: "Above 4K",
    className: "signal-above"
  };
}

function calculate() {
  const originalW = parseInt(document.getElementById("width").value, 10);
  const originalH = parseInt(document.getElementById("height").value, 10);
  const maxWidth = parseInt(document.getElementById("maxWidth").value, 10);

  const summary = document.getElementById("summary");
  const results = document.getElementById("results");
  results.innerHTML = "";

  if (!originalW || !originalH || originalW <= 0 || originalH <= 0) {
    summary.innerHTML = "Please enter valid width and height.";
    return;
  }

  const divisor = gcd(originalW, originalH);
  const ratioW = originalW / divisor;
  const ratioH = originalH / divisor;

  // Base exact aspect-ratio unit.
  // Resolution = ratioW * multiplier x ratioH * multiplier.
  // Need both width and height divisible by 8.
  const valid = [];

  const minScale = 0.5;
  const maxScale = 1.5;

  const minW = originalW * minScale;
  const maxW = originalW * maxScale;

  // Find multiplier range based on width.
  const minMultiplier = Math.ceil(minW / ratioW);
  const maxMultiplier = Math.floor(maxW / ratioW);

  for (let m = minMultiplier; m <= maxMultiplier; m++) {
    const w = ratioW * m;
    const h = ratioH * m;

    if (w % 8 === 0 && h % 8 === 0) {
      const scale = w / originalW;
      const scalePercent = scale * 100;
      const changePercent = (scale - 1) * 100;
      const pixels = w * h;
      const withinMax = !maxWidth || w <= maxWidth;

      valid.push({
        w,
        h,
        scalePercent,
        changePercent,
        pixels,
        withinMax
      });
    }
  }

  // Sort closest to original first
  valid.sort((a, b) => b.scalePercent - a.scalePercent);

  const bestUnderMax = valid.find(v => v.withinMax && v.w <= originalW);
  const exact = valid.find(v => v.w === originalW && v.h === originalH);

  summary.innerHTML = `
    <strong>Original:</strong> ${originalW} × ${originalH}<br>
    <strong>Aspect Ratio:</strong> ${ratioW}:${ratioH}<br>
    <strong>Range Checked:</strong> ${(minScale * 100).toFixed(0)}% to ${(maxScale * 100).toFixed(0)}% of original width<br>
    
    <strong>Max Width:</strong> ${maxWidth || "None"}<br>
    ${bestUnderMax ? `<strong>Recommended under max width:</strong> <span class="good">${bestUnderMax.w} × ${bestUnderMax.h}</span> (${bestUnderMax.changePercent.toFixed(2)}%)` : `<strong>No valid option found under max width.</strong>`}
  `;

  valid.forEach(v => {
      const onlyValid = document.getElementById("onlyValid").checked;
      const mode = document.querySelector('input[name="scaleMode"]:checked').value;

      if (onlyValid && !v.withinMax) return;
      if (mode === "down" && v.changePercent >= 0) return;
      if (mode === "up" && v.changePercent <= 0) return;

      const tr = document.createElement("tr");
      const signalType = getSignalType(v.w, v.h);

      let scaleClass = "";
      if (v.changePercent < 0) scaleClass = "down";
      if (v.changePercent > 0) scaleClass = "up";

      tr.innerHTML = `
        <td><strong>${v.w} × ${v.h}</strong></td>
        <td class="${scaleClass}">${v.scalePercent.toFixed(2)}% (${v.changePercent >= 0 ? "+" : ""}${v.changePercent.toFixed(2)}%)</td>
        <td>${v.w}</td>
        <td>${v.h}</td>
        <td>${v.pixels.toLocaleString()}</td>
        <td><span class="${signalType.className}">${signalType.label}</span></td>
        <td>${v.withinMax ? '<span class="good">Within max width</span>' : 'Over max width'}</td>
      `;

      results.appendChild(tr);
    });
}

calculate();

document.querySelectorAll('input[name="scaleMode"], #onlyValid').forEach(function (el) {
  el.addEventListener("change", calculate);
});

// scaleModeAutoRefresh

let clickCount = 0;
let clickTimer = null;

function unleashChickens() {
  const chickenCount = 13;

  for (let i = 0; i < chickenCount; i++) {
    const chicken = document.createElement("div");
    chicken.className = "chicken-runner";

    // 12 chickens + 1 rooster boss
    chicken.textContent = (i === chickenCount - 1) ? "🐓" : "🐔";

    const isBoss = i === chickenCount - 1;
    const size = isBoss
      ? Math.floor(Math.random() * 18) + 62
      : Math.floor(Math.random() * 34) + 24;

    const top = Math.floor(Math.random() * 75) + 10;
    const speed = isBoss
      ? (Math.random() * 1.3 + 1.8).toFixed(2)
      : (Math.random() * 2.8 + 2.2).toFixed(2);

    const delay = isBoss
      ? "0.65"
      : (Math.random() * 0.55).toFixed(2);

    chicken.style.fontSize = size + "px";
    chicken.style.top = top + "vh";
    chicken.style.animationDuration = speed + "s";
    chicken.style.animationDelay = delay + "s";
    chicken.style.rotate = (Math.random() * 18 - 9).toFixed(1) + "deg";

    document.body.appendChild(chicken);

    setTimeout(() => {
      chicken.remove();
    }, (parseFloat(speed) + parseFloat(delay) + 0.5) * 1000);
  }
}

document.addEventListener("DOMContentLoaded", function () {
  const btn = document.getElementById("calculateBtn");
  if (!btn) return;

  btn.addEventListener("click", function () {
    clickCount++;

    clearTimeout(clickTimer);
    clickTimer = setTimeout(function () {
      clickCount = 0;
    }, 650);

    if (clickCount >= 3) {
      unleashChickens();
      clickCount = 0;
      clearTimeout(clickTimer);
    }
  });
});

</script>

<div class="footer-mark">☾ Built for onsite LED sanity ☽</div>
</body>
</html>
